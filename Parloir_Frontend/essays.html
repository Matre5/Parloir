<!doctype html>

<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Parloir - Essays</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#00520a", // Deep Green
              secondary: "#469110", // Lime Green
              "accent-1": "#660033", // Deep Magenta/Burgundy
              "accent-2": "#E673AC", // Pink
              "background-light": "#f5f8f6",
              "background-dark": "#0f2311",
            },
            fontFamily: {
              display: ["Inter", "sans-serif"],
            },
            borderRadius: {
              DEFAULT: "0.125rem",
              lg: "0.25rem",
              xl: "0.5rem",
              full: "0.75rem",
            },
          },
        },
      };
    </script>
    <style>
      .funky-logo {
        font-weight: 900;
        letter-spacing: -0.05em;
        text-transform: lowercase;
        font-style: italic;
      }
    </style>
  </head>
  <body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 transition-colors duration-200"
  >
    <div class="relative flex min-h-screen w-full flex-col">
      <!-- Header -->
      <header
        class="sticky top-0 z-50 w-full border-b border-primary/10 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md px-6 md:px-20 py-4"
      >
        <div class="mx-auto flex max-w-[1200px] items-center justify-between">
          <div class="flex items-center gap-2">
            <div
              class="flex h-10 w-10 items-center justify-center rounded bg-primary text-white"
            >
              <span class="material-symbols-outlined">auto_stories</span>
            </div>
            <h2 class="funky-logo text-2xl text-primary">
              <a href="index.html">parloir.</a>
            </h2>
          </div>
          <nav class="hidden lg:flex items-center gap-6">
            <a
              class="text-sm font-semibold text-slate-600 hover:text-primary transition-colors"
              href="chat_room.html"
              >Chat Room</a
            >
            <div class="flex flex-col items-center">
                <a class="text-primary text-sm font-bold" href="essays.html">Essays</a>
                <div class="h-1 w-8 bg-primary mt-1 rounded-full"></div>
            </div>
            <a
              class="text-sm font-semibold text-slate-600 hover:text-primary transition-colors"
              href="comprehension.html"
              >Comprehension</a
            >
            <a
              class="text-sm font-semibold text-slate-600 hover:text-primary transition-colors"
              href="word_list.html"
              >Word List</a
            >
            <a
              class="text-sm font-semibold text-slate-600 hover:text-primary transition-colors"
              href="speak.html"
              >Speak</a
            >
            <a
              class="text-sm font-semibold text-slate-600 hover:text-primary transition-colors"
              href="translate.html"
              >Translate</a
            >
          </nav>
        <div class="hidden lg:flex items-center ml-4">
          <div
            class="w-10 h-10 rounded-full border-2 border-primary/20 overflow-hidden bg-pink-100 flex items-center justify-center"
          >
            <img
              alt="User profile"
              class="w-full h-full object-cover"
              src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix"
            />
          </div>
        </div>
        </div>
      </header>
    <!-- Main Content -->
    <main class="max-w-6xl mx-auto px-6 py-12">
        <!-- Prompts Section -->
        <section id="promptsContainer">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-xl font-bold text-slate-900 flex items-center gap-2">
                    Essays of the Day
                    <span class="text-[10px] font-bold text-white bg-accent-soft px-3 py-1 ml-3 rounded-full animate-bounce">New</span>
                </h3>
                <a class="text-xs font-bold text-primary uppercase tracking-widest border-b-2 border-primary/20 hover:border-primary transition-all" href="#">View Archive</a>
            </div>
            <div id="promptsList" class="space-y-4">
                <p class="text-center text-slate-500 py-12">Loading prompts...</p>
            </div>
        </section>

        <!-- Essay Editor (Hidden Initially) -->
        <section id="essayEditor" class="hidden">
            <button id="backToPromptsBtn" class="mb-6 flex items-center gap-2 text-primary hover:text-secondary font-bold">
                <span class="text-xl">←</span>
                Retour aux sujets
            </button>
            
            <div class="bg-white rounded-2xl shadow-lg p-8">
                <h2 id="currentPromptTitle" class="text-3xl font-bold text-primary mb-3">Titre</h2>
                <p id="currentPromptDesc" class="text-slate-600 mb-6">Description</p>
                
                <div class="mb-4">
                    <label class="block text-sm font-bold text-slate-700 mb-2">Votre essai:</label>
                    <textarea id="essayTextarea" rows="15" class="w-full px-4 py-3 border-2 border-slate-200 rounded-lg focus:border-primary outline-none" placeholder="Commencez à écrire en français..."></textarea>
                </div>
                
                <div class="flex justify-between items-center">
                    <span id="wordCount" class="text-sm text-slate-500 font-bold">0 mots</span>
                    <button id="submitEssayBtn" class="px-8 py-3 bg-primary text-white font-bold rounded-lg hover:bg-secondary flex items-center gap-2 shadow-lg">
                        <span class="text-xl">→</span>
                        Soumettre l'essai
                    </button>
                </div>
            </div>
        </section>

        <!-- Feedback Section (Hidden Initially) -->
        <section id="feedbackSection" class="hidden"></section>

        <!-- History Section -->
        <section id="historyContainer" class="mt-16"></section>
    </main>
      <!-- Footer -->
      <footer
        class="mt-auto border-t border-primary/10 bg-white p-8 dark:bg-background-dark"
      >
        <div
          class="mx-auto flex max-w-[1200px] flex-col items-center justify-between gap-4 md:flex-row"
        >
          <p class="text-[10px] font-black uppercase tracking-[0.2em] text-primary/40">
            © 2026 Parloir. Keep writing, keep learning.
          </p>
          <div class="flex gap-6">
            <a class="text-slate-400 hover:text-primary" href="#"
              ><span class="material-symbols-outlined">language</span></a
            >
            <a class="text-slate-400 hover:text-primary" href="#"
              ><span class="material-symbols-outlined">help_outline</span></a
            >
            <a class="text-slate-400 hover:text-primary" href="#"
              ><span class="material-symbols-outlined">settings</span></a
            >
          </div>
        </div>
      </footer>
    </div>

<script src="api.js"></script>
<script src="js/load_profile.js"></script>
<script src="js/essays.js"></script>
</body>
</html>
