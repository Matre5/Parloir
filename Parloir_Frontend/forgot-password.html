<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Parloir</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: { extend: { colors: {
                primary: "#00520a", "accent-green": "#469110",
                "accent-burgundy": "#660033", "accent-pink": "#E673AC"
            }, fontFamily: { display: ["Inter","sans-serif"] } } }
        };
    </script>
</head>
<body class="bg-slate-50 font-display min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8">
        <h1 class="text-3xl font-black text-slate-900 mb-2">Forgot Password?</h1>
        <p class="text-slate-500 mb-6">Enter your email and we'll send you a reset link.</p>
        
        <input id="emailInput" type="email" placeholder="your@email.com"
            class="w-full px-4 py-3 border-2 border-slate-200 rounded-xl mb-4 focus:border-primary outline-none"/>
        
        <button id="submitBtn" onclick="submitForgot()"
            class="w-full bg-primary text-white py-3 rounded-xl font-bold hover:bg-accent-green transition-colors mb-4">
            Send Reset Link
        </button>
        
        <div id="successMsg" class="hidden bg-green-50 border border-green-200 text-green-700 p-4 rounded-xl mb-4 text-sm"></div>
        <div id="errorMsg" class="hidden bg-red-50 border border-red-200 text-red-700 p-4 rounded-xl mb-4 text-sm"></div>
        
        <a href="login.html" class="block text-center text-accent-green font-bold hover:underline">← Back to Login</a>
    </div>

    <script>
        const API = 'http://localhost:8001/api';
        
        async function submitForgot() {
            const email = document.getElementById('emailInput').value.trim();
            const btn = document.getElementById('submitBtn');
            const successMsg = document.getElementById('successMsg');
            const errorMsg = document.getElementById('errorMsg');
            
            if (!email) return;
            
            btn.disabled = true;
            btn.textContent = 'Sending...';
            successMsg.classList.add('hidden');
            errorMsg.classList.add('hidden');
            
            try {
                const res = await fetch(`${API}/auth/forgot-password?email=${encodeURIComponent(email)}`, {
                    method: 'POST'
                });
                const data = await res.json();
                successMsg.textContent = data.message;
                successMsg.classList.remove('hidden');
                btn.textContent = 'Sent!';
            } catch(err) {
                errorMsg.textContent = 'Network error. Please try again.';
                errorMsg.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = 'Send Reset Link';
            }
        }
    </script>
</body>
</html>
