<!DOCTYPE html>

<html lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&amp;family=Bungee&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#00520a",
                        "secondary": "#469110",
                        "accent-1": "#660033",
                        "accent-2": "#E673AC",
                        "accent-green": "#469110",
                        "accent-berry": "#660033",
                        "accent-pink": "#E673AC",
                        "background-light": "#f5f8f6",
                        "background-dark": "#0f2311",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "funky": ["Bungee", "cursive"]
                    },
                    borderRadius: {
                        "DEFAULT": "0rem",
                        "lg": "0rem",
                        "xl": "0rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .word-cloud-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            opacity: 0.15;
            pointer-events: none;
        }
        .floating-word {
            position: absolute;
            font-weight: 900;
            white-space: nowrap;
            filter: drop-shadow(2px 2px 0px rgba(255,255,255,0.8));
        }
        body {
            background-image: radial-gradient(#469110 0.5px, transparent 0.5px);
            background-size: 24px 24px;
        }
    </style>
</head>
<body class="bg-[#f0f9f1] dark:bg-background-dark font-display min-h-screen flex flex-col items-center justify-center p-6 relative overflow-x-hidden">
<!-- Word Cloud Background -->
<div class="word-cloud-bg" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; opacity: 0.25; pointer-events: none; user-select: none;">
<span class="floating-word text-primary text-7xl rotate-[-5deg]" style="top: 8%; left: -2%; font-family: 'serif';">Bonjour</span>
<span class="floating-word text-accent-1 text-5xl rotate-[12deg]" style="top: 12%; left: 75%;">Amour</span>
<span class="floating-word text-secondary text-6xl rotate-[-15deg]" style="top: 45%; left: -5%;">Liberté</span>
<span class="floating-word text-accent-2 text-4xl rotate-[8deg]" style="top: 65%; left: 85%; font-family: 'serif';">Fromage</span>
<span class="floating-word text-primary text-3xl rotate-[-10deg]" style="top: 85%; left: 10%;">baguette</span>
<span class="floating-word text-accent-1 text-6xl rotate-[5deg]" style="top: 88%; left: 65%; font-family: 'serif';">Égalité</span>
<span class="floating-word text-secondary text-5xl rotate-[15deg]" style="top: 22%; left: 45%;">Fraternité</span>
<span class="floating-word text-accent-2 text-8xl rotate-[-8deg] font-black" style="top: 55%; left: 25%;">Chic</span>
<span class="floating-word text-primary text-4xl rotate-[20deg]" style="top: 75%; left: 40%; font-family: 'serif';">Rendez-vous</span>
<span class="floating-word text-accent-1 text-5xl rotate-[-12deg]" style="top: 3%; left: 38%;">Merci</span>
<span class="floating-word text-secondary text-3xl rotate-[45deg]" style="top: 90%; left: 2%;">Santé</span>
<span class="floating-word text-accent-2 text-5xl rotate-[-25deg]" style="top: 30%; left: 80%; font-family: 'serif';">Salut</span>
</div>
<div class="w-full max-w-[440px] flex flex-col items-center">
<!-- Logo -->
<div class="mb-8 text-center">
<div class="flex items-center justify-center gap-2 mb-2">
<span class="material-symbols-outlined text-accent-pink text-7xl mb-2 drop-shadow-[4px_4px_0px_rgba(0,0,0,1)]">forum</span>
</div>
<h1 class="font-funky text-6xl md:text-7xl tracking-tighter text-primary">
                PARLOIR
            </h1>
<p class="text-accent-berry font-bold tracking-widest uppercase text-xs mt-2">Speak French Boldly</p>
</div>
<!-- Login Card -->
<div class="w-full bg-white dark:bg-slate-900 border-4 border-primary p-8 md:p-10 rounded-[40px_15px_40px_15px]">
<div class="mb-8">
<h2 class="text-slate-900 dark:text-slate-100 text-2xl font-bold mb-2">Bienvenue</h2>
<p class="text-slate-600 dark:text-slate-400 text-sm">Connectez-vous pour rejoindre la discussion.</p>
</div>
<form action="#" class="space-y-6">
<div class="space-y-2">
<label class="block text-sm font-bold text-slate-900 dark:text-slate-100 uppercase tracking-wider" for="email">
                        Email
                    </label>
<input class="w-full h-12 border-2 border-primary bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 px-4 focus:ring-0 focus:border-accent-2 outline-none transition-colors placeholder:text-slate-400 rounded-2xl border-[3px]" id="email" placeholder="nom@exemple.fr" required="" type="email"/>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block text-sm font-bold text-slate-900 dark:text-slate-100 uppercase tracking-wider" for="password">
                            Password
                        </label>
<a class="text-xs font-bold text-accent-1 hover:text-accent-2 transition-colors uppercase tracking-tighter" href="#">Forgot password ?</a>
</div>
<div class="relative">
<input class="w-full h-12 border-2 border-primary bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 px-4 focus:ring-0 focus:border-accent-2 outline-none transition-colors placeholder:text-slate-400 rounded-2xl border-[3px]" id="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<div class="pt-2">
<button class="w-full h-16 bg-primary hover:bg-secondary text-white font-black text-xl uppercase tracking-widest transition-all flex items-center justify-center gap-2 rounded-2xl" type="submit">
                        Login
                        <span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</div>
</form>
<div class="mt-10 pt-8 border-t border-slate-100 dark:border-slate-800 text-center">
<p class="text-slate-600 dark:text-slate-400 text-sm">
                    Do not have an account ? 
                    <a class="text-primary dark:text-secondary font-bold hover:underline decoration-2 underline-offset-4" href="signup.html">
                        Create an account
                    </a>
</p>
</div>
</div>
<!-- Footer Links -->
<div class="mt-8 flex gap-6 text-[10px] font-bold uppercase tracking-widest text-primary/40 dark:text-secondary/40">
<a class="hover:text-primary transition-colors" href="#">Confidentialité</a>
<a class="hover:text-primary transition-colors" href="#">Conditions</a>
<a class="hover:text-primary transition-colors" href="#">Aide</a>
</div>
</div>
</body></html>
