<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Parloir</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            theme: { extend: { colors: {
                primary: "#00520a", "accent-green": "#469110",
                "accent-burgundy": "#660033", "accent-pink": "#E673AC"
            }, fontFamily: { display: ["Inter","sans-serif"] } } }
        };
    </script>
</head>
<body class="bg-slate-50 font-display min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8">
        <h1 class="text-3xl font-black text-slate-900 mb-2">Reset Password</h1>
        <p class="text-slate-500 mb-6">Enter your new password below.</p>
        
        <input id="passwordInput" type="password" placeholder="New password (min 6 chars)"
            class="w-full px-4 py-3 border-2 border-slate-200 rounded-xl mb-4 focus:border-primary outline-none"/>
        <input id="confirmInput" type="password" placeholder="Confirm new password"
            class="w-full px-4 py-3 border-2 border-slate-200 rounded-xl mb-4 focus:border-primary outline-none"/>
        
        <button id="submitBtn" onclick="submitReset()"
            class="w-full bg-primary text-white py-3 rounded-xl font-bold hover:bg-accent-green transition-colors mb-4">
            Reset Password
        </button>
        
        <div id="successMsg" class="hidden bg-green-50 border border-green-200 text-green-700 p-4 rounded-xl mb-4 text-sm"></div>
        <div id="errorMsg" class="hidden bg-red-50 border border-red-200 text-red-700 p-4 rounded-xl mb-4 text-sm"></div>
    </div>

    <script>
        const API = 'http://localhost:8001/api';
        const token = new URLSearchParams(window.location.search).get('token');
        
        if (!token) {
            document.getElementById('errorMsg').textContent = 'Invalid reset link.';
            document.getElementById('errorMsg').classList.remove('hidden');
            document.getElementById('submitBtn').disabled = true;
        }
        
        async function submitReset() {
            const password = document.getElementById('passwordInput').value;
            const confirm = document.getElementById('confirmInput').value;
            const btn = document.getElementById('submitBtn');
            const successMsg = document.getElementById('successMsg');
            const errorMsg = document.getElementById('errorMsg');
            
            errorMsg.classList.add('hidden');
            
            if (password.length < 6) {
                errorMsg.textContent = 'Password must be at least 6 characters.';
                errorMsg.classList.remove('hidden');
                return;
            }
            if (password !== confirm) {
                errorMsg.textContent = 'Passwords do not match.';
                errorMsg.classList.remove('hidden');
                return;
            }
            
            btn.disabled = true;
            btn.textContent = 'Resetting...';
            
            try {
                const res = await fetch(`${API}/auth/reset-password?token=${token}&new_password=${encodeURIComponent(password)}`, {
                    method: 'POST'
                });
                const data = await res.json();
                
                if (res.ok) {
                    successMsg.textContent = data.message + ' Redirecting to login...';
                    successMsg.classList.remove('hidden');
                    btn.textContent = 'Done!';
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    errorMsg.textContent = data.detail;
                    errorMsg.classList.remove('hidden');
                    btn.disabled = false;
                    btn.textContent = 'Reset Password';
                }
            } catch(err) {
                errorMsg.textContent = 'Network error. Please try again.';
                errorMsg.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = 'Reset Password';
            }
        }
    </script>
</body>
</html>
